<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stavební úřad – VITA (mockup)</title>
<link rel="stylesheet" href="assets/css/vita.css">
</head>
<body>
<div class="app-window">

  <!-- TITULKOVÝ PRUH -->
  <div class="titlebar">
    <div class="logo"></div>
    <div class="title">Stavební úřad</div>
    <div class="win-controls">
      <button title="Minimalizovat">&#xE921;</button>
      <button title="Maximalizovat">&#xE922;</button>
      <button class="close" title="Zavřít">&#xE8BB;</button>
    </div>
  </div>

  <!-- MENU -->
  <div class="menubar">
    <div class="menu-item"><u>V</u>ěc</div>
    <div class="menu-item"><u>Z</u>obrazit</div>
    <div class="menu-item"><u>H</u>ledej</div>
    <div class="menu-item"><u>Ú</u>daje</div>
    <div class="menu-item"><u>K</u>artotéky</div>
    <div class="menu-item"><u>P</u>ošta</div>
    <div class="menu-item disabled">Mapa</div>
    <div class="menu-item">Zákony</div>
    <div class="menu-item">Program</div>
  </div>

  <!-- TOOLBAR (úvodní – kratší sada) -->
  <div class="toolbar">
    <div class="tbtn" onclick="location.href='pages/zahajeni-rizeni.html'" title="Hledej"><svg viewBox="0 0 24 24"><circle cx="10" cy="10" r="6" fill="none" stroke="#2f6fb0" stroke-width="2"/><line x1="14.5" y1="14.5" x2="21" y2="21" stroke="#2f6fb0" stroke-width="3" stroke-linecap="round"/></svg><span class="lbl">Hledej</span></div>
    <div class="tbtn" onclick="location.href='pages/zahajeni-rizeni.html'" title="Otevřít / opravit záznam"><svg viewBox="0 0 24 24"><path d="M2 6 h7 l2 2 h11 v12 H2 Z" fill="#f4c542" stroke="#caa02b"/><path d="M4 11 h18 l-2 9 H2 Z" fill="#ffd766" stroke="#caa02b"/></svg><span class="lbl">Oprav</span></div>
    <div class="tb-drop">&#9660;</div>
    <div class="tbtn" onclick="location.href='pages/zahajeni-rizeni.html'" title="Nový záznam"><svg viewBox="0 0 24 24"><path d="M6 2 h9 l4 4 v16 H6 Z" fill="#fff" stroke="#888"/><path d="M15 2 v4 h4" fill="#e6e6e6" stroke="#888"/></svg><span class="lbl">Nový</span></div>
    <div class="tbtn" title="Úkoly"><svg viewBox="0 0 24 24"><rect x="5" y="3" width="14" height="19" rx="1" fill="#fff" stroke="#888"/><rect x="8" y="2" width="8" height="3" rx="1" fill="#cfcfcf" stroke="#888"/><path d="M8 10 l2 2 4-5" fill="none" stroke="#2faa4c" stroke-width="2"/><line x1="8" y1="15" x2="16" y2="15" stroke="#bbb" stroke-width="1.5"/><line x1="8" y1="18" x2="16" y2="18" stroke="#bbb" stroke-width="1.5"/></svg><span class="lbl">Úkoly</span></div>
    <div class="tb-drop">&#9660;</div>
    <div class="tb-sep"></div>
    <div class="tbtn" title="Hledej"><svg viewBox="0 0 24 24"><circle cx="10" cy="10" r="6" fill="none" stroke="#2f6fb0" stroke-width="2"/><line x1="14.5" y1="14.5" x2="21" y2="21" stroke="#2f6fb0" stroke-width="3" stroke-linecap="round"/></svg><span class="lbl">Hledej</span></div>
    <div class="tb-drop">&#9660;</div>
    <div class="tbtn" title="Kartotéky"><svg viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="13" rx="1" fill="#6aa0c8" stroke="#3a6e95"/><rect x="6" y="3" width="12" height="5" rx="1" fill="#cdd9a6" stroke="#7d8a55"/><rect x="9" y="9" width="6" height="3" fill="#fff" stroke="#3a6e95"/></svg><span class="lbl">Kartotéky</span></div>
    <div class="tb-drop">&#9660;</div>
  </div>

  <!-- OBSAH: prázdný seznam -->
  <div class="home-area">
    <div class="home-list">
      <div class="hl-head">
        <div class="hl-col col-spis">Spis. zn.</div>
        <div class="hl-col col-zprava">Zpráva</div>
        <div class="hl-col col-rest"></div>
      </div>
      <div class="hl-body">Seznam neobsahuje žádné záznamy</div>
    </div>
  </div>

  <!-- STATUS BAR -->
  <div class="statusbar">
    <div class="sb-left">Stavební úřad - VITA software</div>
    <div class="sb-right">
      <span>5.3.0.33</span>
      <span id="clock">9:05:40</span>
      <span class="sb-dots">
        <span class="sb-dot" style="background:#e74c3c"></span>
        <span class="sb-dot" style="background:#2980b9"></span>
        <span class="sb-dot" style="background:#27ae60"></span>
      </span>
      <span>Krupa Aleš</span>
      <span>Oddělení staveb drah</span>
      <span>https://test-vita.desu.gov.cz/VITA/APP/</span>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="assets/js/vita.js"></script>
</body>
</html>
